{% extends 'base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 p-4 bg-white">
            <h3 class="fw-bold mb-3 text-dark">{{ titulo_accion }}</h3>
            <hr>
            <form method="POST">
                {% csrf_token %}
                <div class="vstack gap-3 mb-4">
                    {{ form.as_p }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning fw-bold text-dark flex-fill">Guardar Cambios</button>
                    <a href="{% url 'lista_funciones' %}" class="btn btn-secondary flex-fill">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
