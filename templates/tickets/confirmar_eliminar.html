{% extends 'base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 p-4 bg-white text-center mt-5">
            <h3 class="fw-bold text-danger mb-3">¿Estás seguro?</h3>
            <p class="text-muted">Estás a punto de eliminar permanentemente: <br><strong class="text-dark">"{{ objeto }}"</strong>.</p>
            <hr>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger flex-fill">Sí, Eliminar</button>
                    <a href="{% url 'lista_peliculas' %}" class="btn btn-secondary flex-fill">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
