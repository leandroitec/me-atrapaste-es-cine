<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Me Atrapaste, Es Cine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="/">🍿 Es Cine.</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link fw-bold" href="{% url 'lista_peliculas' %}">🎬 Ver Cartelera</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="{% url 'lista_funciones' %}">⏰ Funciones</a></li>
                </ul>
                <div class="navbar-nav ms-auto gap-2">
                    {% if user.is_authenticated %}
                        <span class="navbar-text text-light me-2">Hola, <strong>{{ user.username }}</strong>!</span>
                        <a class="btn btn-danger btn-sm px-3" href="{% url 'logout' %}">LOGOUT</a>
                    {% else %}
                        <a class="btn btn-outline-warning btn-sm px-3" href="{% url 'login' %}">LOGIN</a>
                        <a class="btn btn-warning btn-sm px-3 text-dark" href="{% url 'registro' %}">REGISTRARSE</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        {% block contenido %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
