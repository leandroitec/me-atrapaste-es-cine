{% extends 'base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow border-0 p-4 bg-white mt-5">
            <h3 class="text-center fw-bold mb-3">Iniciar Sesión</h3>
            <hr>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold">Ingresar</button>
            </form>
            <p class="text-center mt-3 mb-0 small">
                ¿No tienes cuenta? <a href="{% url 'registro' %}" class="text-warning">Regístrate acá</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
